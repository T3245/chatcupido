<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubacuori Radio-Chat Exclusive 🎧❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Sfondo animato globale */
        body { 
            background: linear-gradient(135deg, #4a0e23 0%, #8c1c40 50%, #b82e58 100%);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🚪 HOME SCREEN / LOGIN */
        .login-screen {
            width: 100%;
            max-width: 450px;
            background-color: rgba(255, 255, 255, 0.96);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .login-title {
            color: #94254b;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .login-subtitle {
            color: #666;
            font-size: 14px;
            margin-top: -10px;
        }

        .login-input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e1b3c4;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #94254b 0%, #b82e58 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(148, 37, 75, 0.4);
        }

        /* 💬 CONTENITORE CHAT STRUTTURATO PER NON SBORDARE */
        .visichat-container {
            width: 100%;
            max-width: 1100px;
            height: 90vh; /* Prende il 90% dell'altezza dello schermo, perfetto per ogni display */
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            display: none; /* Diventa flex via JS */
            flex-direction: column;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Intestazione */
        .visichat-header {
            background: linear-gradient(90deg, #5c142e 0%, #94254b 50%, #5c142e 100%);
            color: white;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* Impedisce all'header di rimpicciolirsi */
        }

        /* Corpo Principale */
        .visichat-main {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 12px;
            gap: 12px;
            background: #fdfafb;
        }

        /* 📻 PANNELLO RADIO */
        .radio-side-panel {
            width: 320px; 
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border: 2px solid #ff4081;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        
        .grid-title {
            color: #ff85a7;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
            text-align: center;
        }

        .player-box {
            width: 100%;
            height: 150px;
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
        }

        .btn-live-link {
            display: block;
            text-align: center;
            background: linear-gradient(90deg, #ff5500 0%, #ff2200 100%);
            color: white;
            padding: 10px;
            font-weight: bold;
            font-size: 13px;
            text-decoration: none;
            border-radius: 8px;
        }

        /* 💬 AREA MESSAGGI CHAT */
        .chat-panel {
            flex: 2; 
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        
        .chat-history {
            flex: 1;
            background-color: #ffffff;
            border: 1px solid #e1b3c4;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto; /* Crea la barra di scorrimento interna per i messaggi */
        }

        .msg-line { margin-bottom: 8px; font-size: 14px; line-height: 1.4; padding: 4px 8px; border-radius: 6px; }
        .msg-system { background-color: #fff0f5; color: #94254b; font-weight: 600; border-left: 4px solid #94254b; }
        .msg-user { background-color: #f1f1f1; color: #333; }

        /* 👥 LISTA UTENTI */
        .users-panel {
            width: 180px;
            background-color: #ffffff;
            border: 1px solid #e1b3c4;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .users-header {
            background: linear-gradient(to bottom, #fce4ec, #f8bbd0);
            color: #880e4f;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #f48fb1;
        }
        
        .users-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .user-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
        .status-dot { width: 10px; height: 10px; background-color: #00ff66; border-radius: 50%; box-shadow: 0 0 6px #00ff66; }
        .status-dj { background-color: #ff007f; box-shadow: 0 0 8px #ff007f; }

        /* 🔒 FOOTER INPUT (BLOCCATO IN BASSO) */
        .visichat-footer {
            background-color: #f5f2eb;
            padding: 12px 20px;
            border-top: 1px solid #e0dbcd;
            flex-shrink: 0; /* Impedisce che sparisca o si schiacci */
        }
        
        .input-bar { display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px 16px; border: 1px solid #ccc; border-radius: 25px; font-size: 14px; outline: none; }
        .btn-send { padding: 0 25px; background: linear-gradient(90deg, #94254b 0%, #b82e58 100%); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<!-- 🚪 HOME PAGE / LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div style="font-size: 50px;">🐯❤️</div>
    <div class="login-title">Rubacuori Club</div>
    <div class="login-subtitle">Scegli il tuo nickname ed entra nella chat di DJ Tigrotta!</div>
    <input type="text" class="login-input" id="nicknameInput" placeholder="Inserisci il tuo Nickname..." maxlength="15">
    <button class="btn-login" id="btnLogin">Entra nel Club</button>
</div>

<!-- 💬 CONTENITORE CHAT (Adattabile e protetto) -->
<div class="visichat-container" id="chatContainer">
    <div class="visichat-header">
        <span>✨ Rubacuori Lounge & Radio v11.5</span>
        <span style="color: #ffb3cd; font-size: 13px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px;">On Air: DJ Tigrotta 🐯🎧</span>
    </div>

    <div class="visichat-main">
        <!-- RADIO -->
        <div class="radio-side-panel">
            <div class="grid-title">🎵 IN CONSOLE: DJ TIGROTTA</div>
            <div class="player-box">
                <iframe width="100%" height="150" src="https://hearthis.at/embed/6a2432fbf1d8edjtita/live/?hcolor=ff4081&bg=222222&style=2" frameborder="0" scrolling="no"></iframe>
            </div>
            <a href="https://hearthis.at/6a2432fbf1d8edjtita/live/" target="_blank" class="btn-live-link">🚀 APRI LIVE INTERA</a>
        </div>

        <!-- CHAT TIMELINE -->
        <div class="chat-panel">
            <div class="chat-history" id="chatHistory">
                <div class="msg-line msg-system">[SISTEMA] Benvenuto nel club! Accendi la radio a sinistra per ballare con DJ Tigrotta! 🐯</div>
            </div>
        </div>

        <!-- UTENTI -->
        <div class="users-panel">
            <div class="users-header">Club Online</div>
            <div class="users-list" id="usersList">
                <div class="user-row"><span class="status-dot status-dj"></span><strong style="color: #d81b60;">DJ_Tigrotta 🐯</strong></div>
                <div class="user-row" id="currentUserRow" style="display:none;"><span class="status-dot"></span><span id="displayMyNick" style="font-weight: bold; color: #333;"></span> (Tu)</div>
            </div>
        </div>
    </div>

    <!-- IL FOOTER INVIATI SARA' SEMPRE BLOCCATO QUI -->
    <div class="visichat-footer">
        <div class="input-bar">
            <input type="text" id="chatInput" placeholder="Scrivi un messaggio e premi invio...">
            <button class="btn-send" id="btnSend">Invia</button>
        </div>
    </div>
</div>

<script>
    // Login
    const loginScreen = document.getElementById('loginScreen');
    const chatContainer = document.getElementById('chatContainer');
    const nicknameInput = document.getElementById('nicknameInput');
    const btnLogin = document.getElementById('btnLogin');
    const currentUserRow = document.getElementById('currentUserRow');
    const displayMyNick = document.getElementById('displayMyNick');
    
    let userNickname = "Ospite";

    function enterChat() {
        const nick = nicknameInput.value.trim();
        if (nick === "") {
            alert("Per favore, inserisci un nickname prima di entrare!");
            return;
        }
        
        userNickname = nick; 
        displayMyNick.innerText = userNickname; 
        currentUserRow.style.display = "flex"; 
        
        loginScreen.style.display = "none";
        chatContainer.style.display = "flex";

        const welcomeMsg = document.createElement('div');
        welcomeMsg.className = "msg-line msg-system";
        welcomeMsg.innerHTML = `[NOTIFICA] 🚪 <strong>${userNickname}</strong> è appena entrato in stanza!`;
        chatHistory.appendChild(welcomeMsg);
    }

    btnLogin.addEventListener('click', enterChat);
    nicknameInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') enterChat(); });

    // Messaggi
    const chatHistory = document.getElementById('chatHistory');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');

    function doSendMessage() {
        const text = chatInput.value.trim();
        if(text === "") return;
        
        const msg = document.createElement('div');
        msg.className = "msg-line msg-user";
        msg.innerHTML = `<strong>${userNickname}:</strong> ${text}`;
        
        chatHistory.appendChild(msg);
        chatHistory.scrollTop = chatHistory.scrollHeight;
        chatInput.value = "";
    }

    btnSend.addEventListener('click', doSendMessage);
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSendMessage(); });
</script>

</body>
</html>
